<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NESTOR AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5202403969725427"
     crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f9f9f9;
            --text-primary: #0d0d0d;
            --text-secondary: #676767;
            --accent: #10a37f; 
            --border-color: #e5e5e5;
            --user-msg-bg: #f4f4f4;
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-main: #212121;
            --bg-sidebar: #171717;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --border-color: #333333;
            --user-msg-bg: #2f2f2f;
            --input-bg: #2f2f2f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .logo { font-weight: 700; font-size: 1.2rem; margin-bottom: 20px; }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border-color); padding-top: 15px; }
        
        .nav-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .nav-item:hover { background: var(--user-msg-bg); color: var(--text-primary); }

        .main-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        .output-box { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; }

        .message-wrapper { width: 100%; padding: 10px 20px; display: flex; flex-direction: column; }
        .message-content {
            max-width: 800px; width: fit-content; margin: 0 auto;
            line-height: 1.6; font-size: 16px; padding: 12px 20px;
            border: 1px solid var(--border-color); border-radius: 18px;
        }

        .user-msg-container .message-content {
            background: var(--user-msg-bg); align-self: flex-end;
            margin-left: auto; margin-right: 0; border-color: transparent;
        }
        .ai-msg .message-content { align-self: flex-start; margin-left: 0; margin-right: auto; }

        #suggestions {
            max-width: 800px; margin: 0 auto; width: 100%;
            display: flex; gap: 8px; flex-wrap: wrap; padding: 0 20px 10px;
        }
        .suggestion-chip {
            padding: 6px 12px; border: 1px solid var(--border-color);
            border-radius: 16px; font-size: 13px; color: var(--text-secondary);
            cursor: pointer; background: var(--bg-main);
        }
        .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); }

        .input-container { width: 100%; padding: 10px 20px 20px; }
        .input-wrapper {
            max-width: 800px; margin: 0 auto; position: relative;
            background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 10px 14px 10px 40px;
            box-shadow: 0 0 15px rgba(0,0,0,0.05); display: flex; align-items: center;
        }
        .add-icon { position: absolute; left: 12px; font-size: 24px; color: var(--text-secondary); cursor: pointer; }
        .text-input { width: 100%; border: none; outline: none; resize: none; font-size: 16px; padding: 8px; max-height: 200px; background: transparent; color: var(--text-primary); }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-left: 8px; }
        
        /* Thinking Animation */
        .typing::after { content: '●'; margin-left: 4px; color: var(--accent); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body data-theme="light">

<aside class="sidebar">
    <div class="logo">NESTOR AI</div>
    <button class="new-chat-btn" onclick="newChat()"><span>+</span> New Chat</button>
    
    <div class="sidebar-bottom">
        <div class="nav-item" onclick="toggleTheme()">
            <span>Dark Mode</span>
            <span id="theme-status">Off</span>
        </div>
    </div>
</aside>

<main class="main-area">
    <div class="output-box" id="output">
        <div class="message-wrapper ai-msg">
            <div class="message-content">Welcome to NESTOR.AI! 🚀 How can I help you?</div>
        </div>
    </div>

    <div id="suggestions"></div>

    <div class="input-container">
        <div class="input-wrapper">
            <span class="add-icon" title="Upload">+</span>
            <textarea id="userInput" class="text-input" rows="1" placeholder="Message Nestor..." oninput="autoResize(this)"></textarea>
            <button class="submit-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</main>

<script>
let chatHistory = [{ role: "system", content: "You are NESTOR AI. Be helpful and concise." }];
let typingInterval = null;

function toggleTheme() {
    const body = document.body;
    const status = document.getElementById('theme-status');
    const isDark = body.getAttribute('data-theme') === 'light';
    body.setAttribute('data-theme', isDark ? 'dark' : 'light');
    status.textContent = isDark ? 'On' : 'Off';
}

function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
}

function newChat() {
    document.getElementById('output').innerHTML = '<div class="message-wrapper ai-msg"><div class="message-content">New session started.</div></div>';
    chatHistory = [{ role: "system", content: "You are NESTOR AI. Be helpful and concise." }];
    document.getElementById('suggestions').innerHTML = '';
}

async function sendMessage(manualText = null) {
    const input = document.getElementById('userInput');
    const text = manualText || input.value.trim();
    if (!text) return;

    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('suggestions').innerHTML = '';

    // Thinking state
    const aiWrapper = document.createElement('div');
    aiWrapper.className = 'message-wrapper ai-msg';
    const aiContent = document.createElement('div');
    aiContent.className = 'message-content typing';
    aiContent.innerText = "Nestor is thinking..."; // Added text here
    aiWrapper.appendChild(aiContent);
    document.getElementById('output').appendChild(aiWrapper);
    document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
    
    chatHistory.push({ role: "user", content: text });

    try {
        const response = await fetch("https://demo-html-three.vercel.app/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory })
        });
        const data = await response.json();
        const aiResponse = data.choices[0].message.content;
        chatHistory.push({ role: "assistant", content: aiResponse });
        
        // Clear "thinking" text and start typing real response
        aiContent.innerText = "";
        typeMarkdown(aiResponse, aiContent);
    } catch (err) {
        aiContent.classList.remove('typing');
        aiContent.innerHTML = `<span style="color:red">Error.</span>`;
    }
}

function appendMessage(role, text) {
    const output = document.getElementById('output');
    const wrapper = document.createElement('div');
    wrapper.className = `message-wrapper ${role === 'user' ? 'user-msg-container' : 'ai-msg'}`;
    const content = document.createElement('div');
    content.className = 'message-content';
    content.textContent = text;
    wrapper.appendChild(content);
    output.scrollTop = output.scrollHeight;
}

function typeMarkdown(text, element) {
    let index = 0;
    if (typingInterval) clearInterval(typingInterval);
    typingInterval = setInterval(() => {
        if (index <= text.length) {
            element.innerHTML = marked.parse(text.slice(0, index++));
            document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
        } else {
            clearInterval(typingInterval);
            element.classList.remove('typing');
            showSuggestions();
        }
    }, 20);
}

function showSuggestions() {
    const container = document.getElementById('suggestions');
    const list = ["Explain more", "Give an example", "What's next?"];
    container.innerHTML = '';
    list.forEach(s => {
        const chip = document.createElement('div');
        chip.className = 'suggestion-chip';
        chip.textContent = s;
        chip.onclick = () => sendMessage(s);
        container.appendChild(chip);
    });
}

document.getElementById('userInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
