<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NESTOR AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f9f9f9;
            --text-primary: #0d0d0d;
            --text-secondary: #676767;
            --accent: #10a37f;
            --border-color: #e5e5e5;
            --user-msg-bg: #f4f4f4;
            --ai-msg-bg: transparent;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo { font-weight: 700; font-size: 1.2rem; margin-bottom: 10px; color: var(--text-primary); }
        .sidebar-info { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-main); }
        .output-box { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; scroll-behavior: smooth; }

        .message-wrapper { width: 100%; padding: 20px; display: flex; flex-direction: column; }
        .message-content { max-width: 800px; width: 100%; margin: 0 auto; line-height: 1.7; font-size: 16px; }

        .user-msg-container { background-color: transparent; }
        .user-msg {
            background: var(--user-msg-bg);
            padding: 12px 20px;
            border-radius: 24px;
            width: fit-content;
            max-width: 80%;
            align-self: flex-end;
            margin-left: auto;
        }

        .ai-msg { background: var(--ai-msg-bg); }
        /* Bolding and Headings */
        .ai-msg strong { font-weight: 700; color: #000; }
        .ai-msg h1, .ai-msg h2, .ai-msg h3 { margin: 16px 0 8px; font-weight: 700; }
        
        pre {
            background: #0d0d0d !important;
            color: #ececec;
            padding: 16px;
            border-radius: 12px;
            margin: 12px 0;
            overflow-x: auto;
            border: 1px solid #333;
        }

        code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.9em; }

        .typing::after {
            content: '●';
            margin-left: 4px;
            color: var(--accent);
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        .input-container { width: 100%; padding: 20px; background: var(--bg-main); }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 14px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        #text-input {
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px;
            padding: 10px;
            color: var(--text-primary);
            max-height: 200px;
            background: transparent;
        }

        .submit-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: var(--accent);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">NESTOR AI</div>
        <div class="sidebar-info">
            <b>Status:</b> Streaming Active<br>
            <b>Speed:</b> 2000 chars/sec<br><br>
            Nestor uses Gemini 1.5 Flash to provide instant answers with full code support.
        </div>
    </div>

    <div class="main-area">
        <div class="output-box" id="chat-output"></div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="text-input" placeholder="How can I help you today?" rows="1"></textarea>
                <button id="send-btn" class="submit-btn">↑</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Gemini SDK via ESM (No terminal needed)
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // Vite environment variable injection
        const API_KEY = import.meta.env.VITE_GEMINI_KEY;
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const chatOutput = document.getElementById('chat-output');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');

        let isGenerating = false;

        // Ultra-fast streaming: 2000 chars per second simulation
        async function typeEffect(fullText, container) {
            let currentText = "";
            const words = fullText.split(""); // Letter by letter
            const batchSize = 25; // Process in chunks to maintain 2000cps
            
            for (let i = 0; i < words.length; i += batchSize) {
                currentText += words.slice(i, i + batchSize).join("");
                container.innerHTML = marked.parse(currentText);
                chatOutput.scrollTop = chatOutput.scrollHeight;
                await new Promise(r => setTimeout(r, 10)); // 10ms interval
            }
        }

        async function startChat() {
            const val = textInput.value.trim();
            if (!val || isGenerating) return;

            isGenerating = true;
            textInput.value = "";

            // Add User Msg
            const uDiv = document.createElement('div');
            uDiv.className = 'message-wrapper';
            uDiv.innerHTML = `<div class="user-msg">${val}</div>`;
            chatOutput.appendChild(uDiv);

            // Add AI Msg Placeholder
            const aDiv = document.createElement('div');
            aDiv.className = 'message-wrapper ai-msg';
            const aContent = document.createElement('div');
            aContent.className = 'message-content typing';
            aDiv.appendChild(aContent);
            chatOutput.appendChild(aDiv);

            try {
                const result = await model.generateContentStream(val);
                let fullResponse = "";

                for await (const chunk of result.stream) {
                    const chunkText = chunk.text();
                    fullResponse += chunkText;
                    // Actual letter-by-letter visual update
                    await typeEffect(fullResponse, aContent);
                }
            } catch (e) {
                aContent.innerHTML = "<b>Error:</b> Check if your API key is correct.";
            } finally {
                aContent.classList.remove('typing');
                isGenerating = false;
            }
        }

        sendBtn.onclick = startChat;
        textInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startChat(); } };
    </script>
</body>
</html>
